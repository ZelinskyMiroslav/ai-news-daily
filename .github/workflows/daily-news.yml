name: Daily AI News

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 warning fix

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests
        
      - name: Run news fetcher
        env:
          NEWSAPI_KEY: ${{ secrets.NEWS_API_KEY }}  # ← NEWS_API_KEY → NEWSAPI_KEY
        run: python fetch_news.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/
          git diff --staged --quiet || git commit -m "📰 Daily AI news $(date +%Y-%m-%d)"
          git push